name: Update listings JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate listings JSON
        run: node scripts/update-listings-json.js

      - name: Commit updated listings
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update listings JSON"
          file_pattern: listings/listings.json
